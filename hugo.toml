baseURL = 'https://jeffeehsiung.github.io/signal-blog/'
locale = 'en-us'
title = 'Duality'
theme = "hugo-coder"
defaultContentLanguage = "en"

[pagination]
pagerSize = 20

[services]
[services.disqus]
shortname = ""

[markup.highlight]
style = "github-dark"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  author = "Duality"
  description = "all about physics-informed quantitative research, signal processing, data science, algorithms, and machine learning."
  info = "Physics-informed financial modeling - where physics meets finance."
  avatarURL = "images/duality_logo_v1.png"
  keywords = "physics-informed finance, quantitative research"
  dateFormat = "January 2, 2006"
  since = 2026
  enableTwemoji = true

  colorScheme = "auto"
  hidecolorschemetoggle = false

  # GTM container ID for analytics and tags (for example: GTM-ABC1234).
  [params.googleTagManager]
  id = "GTM-KH34MMJ3"

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

[params.csp]
  childsrc = ["'self'"]
  fontsrc = [
    "'self'",
    "https://fonts.gstatic.com",
    "https://cdn.jsdelivr.net/"
  ]
  formaction = ["'self'"]
  framesrc = [
    "'self'",
    "https://www.googletagmanager.com"
  ]
  imgsrc = [
    "'self'",
    "https://www.google-analytics.com"
  ]
  objectsrc = ["'none'"]
  stylesrc = [
    "'self'",
    "'unsafe-inline'",
    "https://fonts.googleapis.com/",
    "https://cdn.jsdelivr.net/"
  ]
  scriptsrc = [
    "'self'",
    "'unsafe-inline'",
    "https://www.google-analytics.com",
    "https://www.googletagmanager.com",
    "https://www.clarity.ms"
  ]
  # connect-src directive – defines valid targets for XMLHttpRequest (AJAX), WebSockets or EventSource
  connectsrc = [
    "'self'",
    "https://www.google-analytics.com",
    "https://region1.google-analytics.com",
    "https://stats.g.doubleclick.net",
    "https://*.clarity.ms"
  ]

